<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6"/>
      <stop offset="100%" style="stop-color:#6366F1"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Decorative grid -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-width="0.5" opacity="0.05"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>
  
  <!-- Logo -->
  <g transform="translate(100, 265)">
    <rect width="100" height="100" rx="20" fill="url(#accent)"/>
    <path d="M50 20L62 45L90 48L70 68L74 96L50 82L26 96L30 68L10 48L38 45L50 20Z" fill="white"/>
  </g>
  
  <!-- Title -->
  <text x="220" y="295" font-family="Inter, system-ui, sans-serif" font-size="72" font-weight="bold" fill="white">
    ToolHunt
  </text>
  <text x="220" y="365" font-family="Inter, system-ui, sans-serif" font-size="32" fill="#a1a1aa">
    发现最佳AI工具
  </text>
  
  <!-- Stats -->
  <g transform="translate(220, 420)">
    <rect width="180" height="60" rx="12" fill="#ffffff10"/>
    <text x="90" y="28" font-family="Inter, sans-serif" font-size="24" font-weight="bold" fill="#8B5CF6" text-anchor="middle">400+</text>
    <text x="90" y="48" font-family="Inter, sans-serif" font-size="14" fill="#a1a1aa" text-anchor="middle">AI工具</text>
  </g>
  
  <g transform="translate(420, 420)">
    <rect width="180" height="60" rx="12" fill="#ffffff10"/>
    <text x="90" y="28" font-family="Inter, sans-serif" font-size="24" font-weight="bold" fill="#22c55e" text-anchor="middle">10</text>
    <text x="90" y="48" font-family="Inter, sans-serif" font-size="14" fill="#a1a1aa" text-anchor="middle">分类</text>
  </g>
  
  <!-- Decorative elements -->
  <circle cx="900" cy="150" r="200" fill="url(#accent)" opacity="0.1"/>
  <circle cx="1050" cy="400" r="150" fill="url(#accent)" opacity="0.05"/>
  
  <!-- Category icons -->
  <g transform="translate(850, 100)" opacity="0.6">
    <text font-size="48">🤖</text>
  </g>
  <g transform="translate(950, 180)" opacity="0.6">
    <text font-size="48">💻</text>
  </g>
  <g transform="translate(1050, 120)" opacity="0.6">
    <text font-size="48">🎨</text>
  </g>
  <g transform="translate(900, 280)" opacity="0.6">
    <text font-size="48">⚡</text>
  </g>
</svg>